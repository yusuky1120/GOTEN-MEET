name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend check
        run: npm run check

      - name: Frontend build
        run: npm run build

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Server typecheck
        working-directory: server
        run: npm run typecheck

      - name: Server build
        working-directory: server
        run: npm run build
